# deployment/nginx/conf.d/janeway.conf
# Nginx configuration for Janeway multi-press on djourns.com
# This handles:
# - press.djourns.com
# - anotherpress.djourns.com
# - Automatic HTTPS redirect
# - Static and media file serving

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name press.djourns.com anotherpress.djourns.com www.djourns.com;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS upstream configuration
upstream janeway_web {
    server janeway-web:8000;
}

# Press subdomain (press.djourns.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name press.djourns.com;

    # SSL Certificate paths (updated by Certbot)
    ssl_certificate /etc/nginx/ssl/press.djourns.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/press.djourns.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100M;

    # Health check endpoint
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded content)
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy to Django application
    location / {
        proxy_pass http://janeway_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/press.djourns.com_access.log;
    error_log /var/log/nginx/press.djourns.com_error.log;
}

# Another Press subdomain (anotherpress.djourns.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anotherpress.djourns.com;

    # SSL Certificate paths (updated by Certbot)
    ssl_certificate /etc/nginx/ssl/anotherpress.djourns.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/anotherpress.djourns.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100M;

    # Health check endpoint
    location /health/ {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static files
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files (uploaded content)
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Proxy to Django application
    location / {
        proxy_pass http://janeway_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/anotherpress.djourns.com_access.log;
    error_log /var/log/nginx/anotherpress.djourns.com_error.log;
}

# Root domain redirect (optional)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.djourns.com;

    ssl_certificate /etc/nginx/ssl/press.djourns.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/press.djourns.com/privkey.pem;

    return 301 https://press.djourns.com$request_uri;
}
