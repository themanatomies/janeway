upstream janeway_app {
    server janeway-web:8000;
}

# HTTP redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name press.djourns.com anotherpress.djourns.com www.djourns.com;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/press.djourns.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/press.djourns.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    # Static files from collected-static
    location /static/collected/ {
        alias /usr/share/nginx/html/static/collected/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static files from source
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Media files
    location /media/ {
        alias /usr/share/nginx/html/media/;
        expires 7d;
    }

    # Proxy everything else to Gunicorn
    location / {
        proxy_pass http://janeway_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # Gunicorn timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
